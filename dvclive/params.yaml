data_ingestion:
  test_size: 0.3
  target_variable: Mortality rate, adult, female (per 1,000 female adults)
feature_selection:
  TOP_K: 30
  MIN_ABS_CORR: 0.35
  CORR_METHOD: spearman
model_training:
  model_subsample: 0.7
  model_n_estimators: 300
  model_min_child_weight: 3
  model_max_depth: 3
  model_learning_rate: 0.01
  model_colsample_bytree: 0.85
  random_state: 42
  n_jobs: -5
